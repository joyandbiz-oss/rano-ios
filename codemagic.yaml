workflows:

  rano-testflight:
    name: Rano — TestFlight upload (Sound Lab playground)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      # NOTE: ios_signing pre-flight needs a stored profile (not just cert).
      # We have stored cert «Rano» but no profile yet. Drop pre-flight,
      # let CLI auto-create profile using stored cert.
      groups:
        - codemagic-credentials
      vars:
        APP_STORE_APPLE_ID: "6771270542"
        BUNDLE_ID: "com.andriibyzov.rano"
        XCODE_WORKSPACE: "Rano.xcodeproj"
        XCODE_SCHEME: "Rano"
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: ASC_API_KEY
    scripts:

      - name: Install xcodegen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Initialize keychain
        script: |
          keychain initialize

      - name: Fetch provisioning profiles (cert already in Codemagic store)
        script: |
          # Cert «Rano» uploaded to Code signing identities by Andrii.
          # Just need to fetch matching App Store profile.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Set build number
        script: |
          set -e
          REMOTE_LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          NEW_BUILD=$(( REMOTE_LATEST + 1 ))
          # Use Codemagic's $BUILD_NUMBER (auto-incrementing per build) and
          # take the max of (remote+1) and Codemagic's BUILD_NUMBER
          if [ "$BUILD_NUMBER" -gt "$NEW_BUILD" ]; then
            NEW_BUILD=$BUILD_NUMBER
          fi
          echo "Remote latest: $REMOTE_LATEST | Codemagic: $BUILD_NUMBER | Using: $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal
        expire_build_submitted_for_review: false
