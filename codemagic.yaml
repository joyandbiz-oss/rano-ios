workflows:

  rano-testflight:
    name: Rano — TestFlight upload (Sound Lab playground)
    instance_type: mac_mini_m2
    max_build_duration: 30
    integrations:
      app_store_connect: ASC_API_KEY
    environment:
      # Codemagic-stored cert «Rano» + profile «rano_cm» (Andrii uploaded
      # via UI 2026-05-20). ios_signing pre-flight now finds both.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.andriibyzov.rano
      vars:
        APP_STORE_APPLE_ID: "6771270542"
        BUNDLE_ID: "com.andriibyzov.rano"
        XCODE_PROJECT: "Rano.xcodeproj"
        XCODE_SCHEME: "Rano"
      xcode: latest
      cocoapods: default

    scripts:

      - name: Install xcodegen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Initialize keychain
        script: |
          keychain initialize

      - name: Add stored cert + profile to keychain
        script: |
          # Codemagic auto-pulls from CSI (Code signing identities)
          # because ios_signing block is set in env above.
          keychain add-certificates

      - name: Apply provisioning profiles to Xcode targets
        script: |
          xcode-project use-profiles

      - name: Set build number
        script: |
          set -e
          REMOTE_LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          NEW_BUILD=$(( REMOTE_LATEST + 1 ))
          if [ "$BUILD_NUMBER" -gt "$NEW_BUILD" ]; then
            NEW_BUILD=$BUILD_NUMBER
          fi
          echo "Remote latest: $REMOTE_LATEST | Codemagic: $BUILD_NUMBER | Using: $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal
        expire_build_submitted_for_review: false
